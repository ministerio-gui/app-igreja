<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#dfe2ee",
                    "on-error": "#690005",
                    "surface-container": "#1c2028",
                    "on-tertiary": "#333028",
                    "background": "#090D15", /* Updated to match user request */
                    "surface-dim": "#0f131c",
                    "on-primary-fixed-variant": "#134393",
                    "on-primary": "#002d6e",
                    "error": "#ffb4ab",
                    "on-background": "#dfe2ee",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-container": "#fefbff",
                    "error-container": "#93000a",
                    "primary-container": "#4c72c4",
                    "surface-tint": "#b0c6ff",
                    "on-tertiary-fixed-variant": "#49473e",
                    "outline": "#8d909d",
                    "inverse-surface": "#dfe2ee",
                    "secondary-container": "#384668",
                    "outline-variant": "#434651",
                    "surface-container-highest": "#31353e",
                    "primary": "#b0c6ff",
                    "surface-variant": "#31353e",
                    "surface-container-high": "#262a33",
                    "on-tertiary-fixed": "#1d1c14",
                    "on-secondary-fixed-variant": "#384668",
                    "on-secondary": "#213050",
                    "on-error-container": "#ffdad6",
                    "inverse-on-surface": "#2c3039",
                    "secondary": "#b7c6ee",
                    "tertiary-container": "#78746a",
                    "inverse-primary": "#335bac",
                    "surface-container-lowest": "#0a0e16",
                    "surface": "#111827", /* Form card surface */
                    "on-secondary-container": "#a6b5dc",
                    "surface-bright": "#353942",
                    "secondary-fixed": "#d9e2ff",
                    "tertiary-fixed-dim": "#cbc6bb",
                    "tertiary": "#cbc6bb",
                    "secondary-fixed-dim": "#b7c6ee",
                    "on-primary-fixed": "#001945",
                    "primary-fixed": "#d9e2ff",
                    "on-secondary-fixed": "#0a1a3a",
                    "on-surface-variant": "#c3c6d3",
                    "primary-fixed-dim": "#b0c6ff",
                    "surface-container-low": "#181c24",
                    "tertiary-fixed": "#e8e2d6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #090D15;
            color: #EEE8DC;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-shadow {
            box-shadow: 0 4px 24px rgba(76, 114, 196, 0.35);
        }
        .bg-navy-logo {
            background-color: #1B2A4A;
        }
        .text-cream {
            color: #EEE8DC;
        }
        .text-muted-ad {
            color: #3D506B;
        }
        .text-label-ad {
            color: #7A8BA8;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col h-screen max-w-[390px] mx-auto relative overflow-hidden">
<!-- Top Area (35%) -->
<div class="flex flex-col items-center justify-end h-[35%] pb-8 px-6">
<!-- Logo -->
<div class="w-[72px] h-[72px] rounded-full bg-navy-logo flex items-center justify-center mb-6 overflow-hidden">
<span class="material-symbols-outlined text-cream text-4xl" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<!-- App Identity -->
<h1 class="text-[32px] font-[800] text-cream leading-tight tracking-[-0.02em] mb-1">
            Líderes AD
        </h1>
<p class="text-[11px] font-normal text-muted-ad tracking-[0.12em] uppercase text-center">
            Assembleia de Deus · Liderança Jovem
        </p>
</div>
<!-- Form Card (Center) -->
<main class="flex-1 px-6">
<div class="bg-[#111827] border border-white/[0.07] rounded-[18px] p-[26px] flex flex-col space-y-5 shadow-2xl">
<!-- Email Field -->
<div class="flex flex-col space-y-2">
<label class="text-[13px] font-medium text-label-ad px-1" for="email">Email</label>
<input class="w-full h-[50px] bg-[#0F1A2E] border border-white/[0.10] rounded-[10px] px-4 text-cream placeholder-[#3D506B] focus:ring-1 focus:ring-[#4C72C4] focus:border-[#4C72C4] transition-all outline-none" id="email" placeholder="nome@admissao.com.br" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col space-y-2">
<label class="text-[13px] font-medium text-label-ad px-1" for="password">Senha</label>
<div class="relative">
<input class="w-full h-[50px] bg-[#0F1A2E] border border-white/[0.10] rounded-[10px] px-4 pr-12 text-cream focus:ring-1 focus:ring-[#4C72C4] focus:border-[#4C72C4] transition-all outline-none" id="password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-label-ad hover:text-cream transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-[13px] font-normal text-label-ad hover:text-cream transition-colors" href="#">Esqueci minha senha</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-[#4C72C4] text-[#EEE8DC] font-semibold text-[15px] rounded-[10px] glow-shadow active:scale-[0.98] transition-all flex items-center justify-center space-x-2 mt-4">
<span>Entrar</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Area -->
<footer class="pb-10 flex flex-col items-center">
<span class="text-[11px] font-normal text-muted-ad">v1.0</span>
<!-- iOS Home Indicator simulation space -->
<div class="h-1 w-32 bg-white/10 rounded-full mt-4"></div>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed top-[-100px] right-[-100px] w-[300px] h-[300px] bg-[#4C72C4] opacity-[0.03] blur-[100px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-50px] left-[-50px] w-[250px] h-[250px] bg-[#4C72C4] opacity-[0.02] blur-[80px] rounded-full pointer-events-none"></div>
</body></html>
